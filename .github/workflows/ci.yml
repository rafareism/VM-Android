name: ci-legacy-alias

on:
  workflow_call:
  push:
    branches: [main, master, dev, "release/**"]
  pull_request:
    branches: [main, master, dev, "release/**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-legacy-alias-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-ci-canonical:
    name: host-ci-canonical
    uses: ./.github/workflows/host-ci.yml
