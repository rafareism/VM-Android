name: release-dual-track

on:
  workflow_dispatch:
    inputs:
      official_release:
        description: "Executa trilha oficial assinada (requer secrets de assinatura)"
        type: boolean
        default: true
      run_native_checks:
        description: "Executar matriz nativa CMake/NDK"
        type: boolean
        default: true
      log_level:
        description: "Nível de log Gradle"
        type: choice
        default: lifecycle
        options: [lifecycle, info, debug]

permissions:
  contents: read

concurrency:
  group: release-dual-track-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-unsigned-internal:
    name: Release unsigned internal (arm32+arm64)
    uses: ./.github/workflows/android-ci.yml
    permissions:
      contents: read
    with:
      ci_lane: release-unsigned-internal
      run_workfile: release_gate
      build_variant: release
      signing_mode: unsigned
      abi_profile: internal_arm32_arm64
      native_matrix_profile: canonical
      run_lint: true
      run_native_checks: ${{ github.event.inputs.run_native_checks == 'true' }}
      log_level: ${{ github.event.inputs.log_level || 'lifecycle' }}
    secrets: inherit

  release-signed-official:
    name: Release signed official (arm32+arm64)
    if: ${{ github.event.inputs.official_release == 'true' }}
    uses: ./.github/workflows/android-ci.yml
    permissions:
      contents: read
    with:
      ci_lane: release-signed-official-arm32-arm64
      run_workfile: release_gate
      build_variant: release
      signing_mode: signed
      abi_profile: official_arm32_arm64
      native_matrix_profile: canonical
      run_lint: true
      run_native_checks: ${{ github.event.inputs.run_native_checks == 'true' }}
      log_level: ${{ github.event.inputs.log_level || 'lifecycle' }}
    secrets: inherit

  release-dual-gate:
    name: Release dual gate
    runs-on: ubuntu-latest
    if: always()
    needs: [release-unsigned-internal, release-signed-official]
    steps:
      - name: Validate unsigned lane
        shell: bash
        run: |
          set -euo pipefail
          [[ "${{ needs.release-unsigned-internal.result }}" == "success" ]]

      - name: Validate signed lane when enabled
        if: ${{ github.event.inputs.official_release == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "${{ needs.release-signed-official.result }}" == "success" ]]
